<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lgGrad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#78e5d8"/>
      <stop offset="0.55" stop-color="#2b8fb5"/>
      <stop offset="1" stop-color="#1e2575"/>
    </linearGradient>
    <linearGradient id="lgSheen" x1="0" y1="0" x2="0" y2="40">
      <stop offset="0" stop-color="white" stop-opacity="0.28"/>
      <stop offset="0.6" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="areaFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#181e2e" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#181e2e" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- tile -->
  <rect x="1" y="1" width="38" height="38" rx="11" fill="url(#lgGrad)"/>
  <rect x="1" y="1" width="38" height="38" rx="11" fill="url(#lgSheen)"/>
  <rect x="1.5" y="1.5" width="37" height="37" rx="10.5" fill="none" stroke="white" stroke-opacity="0.22"/>

  <!-- subtle grid lines -->
  <g stroke="#181e2e" stroke-opacity="0.12" stroke-width="0.6">
    <line x1="7" y1="14" x2="33" y2="14"/>
    <line x1="7" y1="22" x2="33" y2="22"/>
    <line x1="7" y1="30" x2="33" y2="30"/>
  </g>

  <!-- trendline area fill -->
  <path d="M7 28 L13 24 L18 26 L24 18 L30 12 L33 9 L33 33 L7 33 Z" fill="url(#areaFill)"/>

  <!-- trendline -->
  <path d="M7 28 L13 24 L18 26 L24 18 L30 12 L33 9"
        fill="none" stroke="#181e2e" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- price nodes -->
  <g fill="#181e2e">
    <circle cx="13" cy="24" r="1.4"/>
    <circle cx="18" cy="26" r="1.4"/>
    <circle cx="24" cy="18" r="1.4"/>
  </g>

  <!-- breakout node -->
  <circle cx="30" cy="12" r="2.6" fill="#d4f5ee" stroke="#181e2e" stroke-width="1.2"/>

  <!-- breakout arrow -->
  <g stroke="#181e2e" stroke-width="1.6" stroke-linecap="round" fill="none">
    <path d="M32 10 L35 7"/>
    <path d="M35 7 L32.5 7"/>
    <path d="M35 7 L35 9.5"/>
  </g>
</svg>
